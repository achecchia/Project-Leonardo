# This file contains pin mappings for the stock 2020 Creality Ender 3
# with the 32-bit Creality 4.2.2 board with BLTouch. To use this config, during
# "make menuconfig" select the STM32F103 with a "28KiB bootloader" and
# serial (on USART1 PA10/PA9) communication.
# adapted for my printer ender3-4.2.2

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.

#####################################################################
#      Include Other CFGs
#####################################################################

[include mainsail.cfg]
# [include shell_command.cfg]
[include macros.cfg]
#[include adxlmcu.cfg] #Enable this when using the Accelerometer, Disable when not calibrating. Not Disabling will cause the printer to not work.

#####################################################################
#      General Settings
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[menu __main  __octoprint __poweroff]
type: command
#enable: !toolhead.is_printing
name: Turn off Octopi
gcode:
    {action_respond_info('action:poweroff')}

[gcode_arcs]
resolution = 1.0

#####################################################################
#      X/Y/Z Stepper Settings
#####################################################################

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 80           # Increase from 50 to 80
second_homing_speed: 10    # Keep this slow for precision

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 80           # Increase from 50 to 80
second_homing_speed: 10

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
#endstop_pin: ^PA7
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min:-6

[safe_z_home]
[safe_z_home]
home_xy_position: 117.5, 145.5    # Explains to Klipper exactly where to move the nozzle so the BLTouch hits the dead center
speed: 80                         # Travel speed to moving to home position
z_hop: 10                         # Lifts the toolhead 10mm before moving to prevent scraping
z_hop_speed: 10

#####################################################################
#      Extruder Settings
#####################################################################

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: !PB3 # <--- ADDED '!' TO INVERT DIRECTION FOR DUAL GEARS
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.71 # <--- CHANGED FROM 34.404 FOR BMG 3:1 GEARING
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
#control: pid
# tuned for stock hardware with 200 degree Celsius target
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: -30
max_temp: 250
pressure_advance: 0.04 # <--- CHANGED FROM 0.61 (Direct Drive baseline)
max_extrude_cross_section: 64

#####################################################################
#      Bed Settings / Leveling Settings
#####################################################################

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
# tuned for stock hardware with 50 degree Celsius target
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

# Pin mappings for BL_T port
[bltouch]
sensor_pin: ^PA7
control_pin: PB0
#z_offset = 0
x_offset: 0 # -4 pre ductinator
y_offset: -28 # -3 pre ductinator
stow_on_each_sample: True
probe_with_touch_mode: False
pin_up_touch_mode_reports_triggered: False

[bed_mesh]
speed: 150
horizontal_move_z: 7
mesh_min: 49, 13       #!!min and max co-ords are based on the probes location not the nozzle!!
mesh_max: 221, 222  #needs to be calibrated for your individual printer
probe_count: 5,5 #this is the number of probing points on X then Y axis
mesh_pps: 2,2
fade_start: 1
fade_end: 10
fade_target: 0

[screws_tilt_adjust]
screw1: 75,42
screw1_name: front left screw
screw2: 232,42
screw2_name: front right screw
screw3: 232,217
screw3_name: rear right screw
screw4: 75,217
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 250.
screw_thread: CW-M4 # Use CW for Clockwise and CCW for Counter Clockwise 

#####################################################################
#      Cooling Settings
#####################################################################

[fan]
pin: PA0

