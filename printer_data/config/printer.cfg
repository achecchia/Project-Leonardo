# ============================================================
# Project Leonardo - Ender 3 / Creality 4.2.2 / Klipper
# Consolidated printer.cfg
#
# Design notes:
# - mainsail.cfg owns Mainsail client helpers like [display_status], PAUSE, RESUME, and CANCEL_PRINT.
# - macros.cfg owns PRINT_START, PRINT_END, PRIME_LINE, manual mesh helpers, PID helpers, and parking macros.
# - printer.cfg owns hardware, motion, heaters, probe, bed mesh definition, display pins, and [exclude_object].
# - No TMC/UART driver sections are included because this Creality 4.2.2 setup is treated as standalone-driver mode.
# - Saved stale bed mesh data was intentionally removed from this generated copy.
#   Create a fresh mesh later with: CREATE_BED_MESH TEMP=60 SOAK=300 SAVE=1
# ============================================================

#####################################################################
# Includes
#####################################################################

[include mainsail.cfg]
[include mainsail_overrides.cfg]
[include shell_command.cfg]
[include macros.cfg]
#[include adxlmcu.cfg]  # Enable only while using the accelerometer. Disable for normal printing.

#####################################################################
# MCU / Printer
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

#####################################################################
# LCD Menu Extras
#####################################################################

[menu __main  __octoprint __poweroff]
type: command
#enable: !toolhead.is_printing
name: Turn off Octopi
gcode:
    {action_respond_info('action:poweroff')}

#####################################################################
# General Klipper Features
#####################################################################

[gcode_arcs]
resolution: 1.0

[exclude_object]

#####################################################################
# X/Y/Z Steppers
#####################################################################

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 80
second_homing_speed: 10

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 80
second_homing_speed: 10

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -6

#####################################################################
# Safe Z Home
#####################################################################

[safe_z_home]
home_xy_position: 117.5, 145.5
speed: 80
z_hop: 10
z_hop_speed: 10

#####################################################################
# Extruder - BMG-Style Direct Drive
#####################################################################

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: !PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.77
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PC5
min_temp: 0
max_temp: 300
pressure_advance: 0.04
max_extrude_cross_section: 64
max_power: 0.5

# Notes:
# - rotation_distance: 7.71 is your current BMG-style baseline.
#   Re-check with a real 100mm extrusion calibration after the hardware is finalized.
# - pressure_advance: 0.04 is a conservative direct-drive baseline.
#   Re-tune after the hotend/heatbreak/nozzle setup is finalized.
# - max_extrude_cross_section: 64 supports purge/prime macros.
#   Do not treat it as permission to run wild high-flow settings before tuning.
# - If the CHC hotend uses a different thermistor, update sensor_type before heating.

#####################################################################
# Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130

#####################################################################
# BLTouch
#####################################################################

[bltouch]
sensor_pin: ^PA7
control_pin: PB0
x_offset: 0
y_offset: -28
stow_on_each_sample: True
probe_with_touch_mode: False
pin_up_touch_mode_reports_triggered: False

#####################################################################
# Bed Mesh Definition
#####################################################################

[bed_mesh]
speed: 150
horizontal_move_z: 7
mesh_min: 10, 10
mesh_max: 220, 200
probe_count: 5,5
mesh_pps: 2,2
fade_start: 1
fade_end: 10
fade_target: 0

# Mesh policy:
# - Normal print starts load saved mesh profile "default" if it exists.
# - Normal print starts do NOT run BED_MESH_CALIBRATE.
# - Create/update the saved mesh manually using CREATE_BED_MESH from macros.cfg.
# - Keep probe_count at 5,5 unless interpolation/settings are reviewed.

#####################################################################
# Screws Tilt Adjust
#####################################################################

[screws_tilt_adjust]
screw1: 31,62
screw1_name: front left screw
screw2: 201,62
screw2_name: front right screw
screw3: 201,235
screw3_name: rear right screw
screw4: 31,235
screw4_name: rear left screw
horizontal_move_z: 10
speed: 150
screw_thread: CW-M4

#####################################################################
# Cooling
#####################################################################

[fan]
pin: PA0

#####################################################################
# LCD Display / Beeper
#####################################################################

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

[board_pins]
aliases:
  EXP1_1=PC6,EXP1_3=PB10,EXP1_5=PB14,EXP1_7=PB12,EXP1_9=<GND>,
  EXP1_2=PB2,EXP1_4=PB11,EXP1_6=PB13,EXP1_8=PB15,EXP1_10=<5V>,
  PROBE_IN=PB0,PROBE_OUT=PB1,FIL_RUNOUT=PC6

#####################################################################
# Notes / Ownership
#####################################################################

# mainsail_overrides.cfg customizes Mainsail's read-only client variables.
# Do not replace the managed/read-only mainsail.cfg directly.
# [display_status] is supplied by mainsail.cfg.
# Do not also define it here.
#
# PAUSE, RESUME, CANCEL_PRINT, and related Mainsail client helpers are supplied by mainsail.cfg.
# Do not also define them here.
#
# PRINT_START, PRINT_END, manual mesh helpers, prime line, PID helpers, and parking macros are supplied by macros.cfg.

