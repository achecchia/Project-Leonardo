# ============================================================
# Ender 3 / Creality 4.2.2 / Klipper
# Clean working configuration based on Anthony's current printer.cfg
#
# Notes:
# - This keeps your known-good pins, BLTouch offsets, mesh bounds,
#   BMG rotation_distance, PID values, bed mesh, and input shaper data.
# - It removes duplicate/conflicting sections and fixes unsafe/sloppy values.
# - TMC/UART is intentionally NOT configured because your 4.2.2 board is
#   using hardware Vref adjustment on the board, not Klipper UART current control.
# - CHC hotend upgrade notes are left inline where future changes will matter.
# ============================================================

#####################################################################
# Includes
#####################################################################

[include mainsail.cfg]
[include macros.cfg]
# [include shell_command.cfg]  # Optional: only enable if klipper-backup is installed and used.
# [include adxlmcu.cfg]        # Enable only while using the external accelerometer.
                              # Leave disabled during normal printing.

#####################################################################
# MCU / Printer
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# NOTE:
# These motion limits are reasonable for the current state and your saved
# input shaper values. Do not raise these until the new hotend is installed
# and the printer is re-tested.

[gcode_arcs]
resolution: 1.0
# CHANGE: fixed Klipper syntax from "resolution = 1.0" to "resolution: 1.0".

#####################################################################
# X/Y/Z Steppers
#####################################################################

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 80
second_homing_speed: 10

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 80
second_homing_speed: 10

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -6
# CHANGE: formatting cleanup only. Your probe-based Z homing is preserved.

#####################################################################
# Safe Z Home
#####################################################################

[safe_z_home]
home_xy_position: 117.5, 145.5
speed: 80
z_hop: 10
z_hop_speed: 10
# CHANGE: removed duplicate [safe_z_home] header.
# WHY: duplicate sections can cause config parsing/conflict problems.

#####################################################################
# Extruder - BMG Direct Drive
#####################################################################

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: !PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.71
# NOTE: BMG clone baseline. Re-check with a real 100mm extrusion calibration
# after all hardware is installed.

nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 250
# CHANGE: min_temp was -30. Changed to 0.
# WHY: negative min_temp can mask thermistor/wiring faults. Use 0 for normal use.
# FUTURE CHC NOTE: when installing the CHC kit, verify the thermistor type.
# If the CHC uses a different thermistor, sensor_type MUST be changed before heating.

pressure_advance: 0.04
# NOTE: conservative direct-drive value. Re-tune after the CHC/heatbreak/nozzle upgrade.

max_extrude_cross_section: 64
# NOTE: allows purge lines/macros to extrude without false cross-section errors.
# Keep, but do not use this as permission to run extreme flow before tuning.

#####################################################################
# Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130

#####################################################################
# BLTouch
#####################################################################

[bltouch]
sensor_pin: ^PA7
control_pin: PB0
x_offset: 0
y_offset: -28
stow_on_each_sample: True
probe_with_touch_mode: False
pin_up_touch_mode_reports_triggered: False
# NOTE: Preserved because your BLTouch is currently behaving correctly.
# Do not chase probe settings unless reliability issues appear.

#####################################################################
# Bed Mesh
#####################################################################

[bed_mesh]
speed: 150
horizontal_move_z: 7
mesh_min: 49, 13
mesh_max: 221, 222
probe_count: 5, 5
mesh_pps: 2, 2
fade_start: 1
fade_end: 10
fade_target: 0
# NOTE: probe coordinates preserved from your working setup.

[screws_tilt_adjust]
screw1: 75,42
screw1_name: front left screw
screw2: 232,42
screw2_name: front right screw
screw3: 232,217
screw3_name: rear right screw
screw4: 75,217
screw4_name: rear left screw
horizontal_move_z: 10
speed: 250
screw_thread: CW-M4

#####################################################################
# Cooling
#####################################################################

[fan]
pin: PA0

#####################################################################
# LCD Display / Beeper
#####################################################################

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

[board_pins]
aliases:
  EXP1_1=PC6,EXP1_3=PB10,EXP1_5=PB14,EXP1_7=PB12,EXP1_9=<GND>,
  EXP1_2=PB2,EXP1_4=PB11,EXP1_6=PB13,EXP1_8=PB15,EXP1_10=<5V>,
  PROBE_IN=PB0,PROBE_OUT=PB1,FIL_RUNOUT=PC6

# NOTE:
# [display_status] is supplied by mainsail.cfg. It is not repeated here
# to avoid duplicate section conflicts.

#####################################################################
# Stepper Driver / UART Note
#####################################################################

# No [tmc2208] / [tmc2209] sections are included intentionally.
# Your Creality 4.2.2 board is being treated as standalone-driver mode,
# with motor current set by the physical Vref potentiometers on the board.
# Do not add UART driver sections unless the board is intentionally modified
# and verified for UART control.

