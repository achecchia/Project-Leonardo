# ============================================================
# Clean Ender 3 Macro Set
# Intended for: Creality Ender 3 + Klipper + Mainsail + BLTouch
#
# Notes:
# - This replaces the large generated macro file.
# - It removes duplicate PAUSE/RESUME/CANCEL_PRINT definitions.
# - Mainsail handles PAUSE, RESUME, CANCEL_PRINT, virtual_sdcard,
#   respond, and display_status.
# - These macros are intentionally conservative until the CHC hotend,
#   heatbreak, and nozzle are installed and tuned.
# ============================================================

[exclude_object]
# Required for object cancellation support in Mainsail/Orca/PrusaSlicer.

#####################################################################
# PRINT_START
#####################################################################

[gcode_macro PRINT_START]
description: Start print macro for Ender 3 / BLTouch / direct drive
gcode:
    {% set BED = params.BED_TEMP|default(params.BED|default(60))|float %}
    {% set EXTRUDER = params.EXTRUDER_TEMP|default(params.EXTRUDER|default(200))|float %}
    {% set LOAD_MESH = params.LOAD_MESH|default(1)|int %}

    M117 Heating bed
    G90
    M83
    M140 S{BED}
    M104 S150
    M190 S{BED}

    M117 Homing
    G28

    {% if LOAD_MESH == 1 %}
        M117 Loading mesh
        BED_MESH_PROFILE LOAD=default
    {% else %}
        M117 Calibrating mesh
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE
    {% endif %}

    M117 Heating nozzle
    M109 S{EXTRUDER}

    M117 Purging
    PRIME_LINE
    M117 Printing

# WHY THIS DESIGN:
# - Bed heats first for stable probing/mesh behavior.
# - Nozzle preheats only to 150C before homing to reduce ooze.
# - Default behavior loads your saved mesh instead of recalibrating every print.
# - To force a fresh mesh from slicer/start gcode, call:
#   PRINT_START BED_TEMP=60 EXTRUDER_TEMP=200 LOAD_MESH=0

#####################################################################
# PRINT_END
#####################################################################

[gcode_macro PRINT_END]
description: End print macro for Ender 3
gcode:
    M400
    G92 E0
    G1 E-2.0 F1800
    G91
    G1 Z10 F1200
    G90
    G1 X0 Y230 F6000
    M106 S0
    TURN_OFF_HEATERS
    M84 X Y E
    M117 Print complete

# CHANGE FROM OLD MACRO:
# - Removed E-25 retract.
# WHY: 25mm retract is excessive for direct drive and can cause jams,
# especially once the all-metal/CHC hotend is installed.

#####################################################################
# PRIME_LINE
#####################################################################

[gcode_macro PRIME_LINE]
description: Conservative front-left purge line
gcode:
    SAVE_GCODE_STATE NAME=PRIME_LINE_STATE
    G90
    M83
    G92 E0
    G1 Z5.0 F3000
    G1 X5 Y20 F5000
    G1 Z0.30 F1200
    G1 X5 Y200 E12 F1200
    G1 X5.4 Y200 F5000
    G1 X5.4 Y20 E12 F1200
    G92 E0
    G1 Z2.0 F3000
    RESTORE_GCODE_STATE NAME=PRIME_LINE_STATE

# WHY SIMPLE PURGE INSTEAD OF ADAPTIVE PURGE:
# - Your previous macro stack had generated/adaptive logic not needed right now.
# - Simple purge is reliable and easy to diagnose.
# - Adaptive purge can be revisited after the new hotend is installed.

#####################################################################
# G29 Compatibility
#####################################################################

[gcode_macro G29]
description: Marlin-style bed mesh compatibility command
gcode:
    G28
    BED_MESH_CALIBRATE

#####################################################################
# M600 Filament Change
#####################################################################

[gcode_macro M600]
description: Basic filament change using Mainsail PAUSE behavior
gcode:
    PAUSE

# NOTE:
# Mainsail's PAUSE/RESUME macros handle the actual park/resume behavior.
# This keeps M600 simple and avoids duplicate pause logic.

#####################################################################
# Utility Macros
#####################################################################

[gcode_macro HOME_IF_NEEDED]
description: Home all axes only if printer is not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

[gcode_macro PARK_FRONT]
description: Park toolhead at front-left for access
gcode:
    HOME_IF_NEEDED
    G90
    G1 Z10 F1200
    G1 X0 Y230 F6000

[gcode_macro PARK_CENTER]
description: Park toolhead near bed center
gcode:
    HOME_IF_NEEDED
    G90
    G1 Z20 F1200
    G1 X117.5 Y117.5 F6000

[gcode_macro HEAT_SOAK_BED]
description: Heat bed and wait; useful before mesh or leveling
# Usage: HEAT_SOAK_BED TEMP=60 TIME=300
gcode:
    {% set TEMP = params.TEMP|default(60)|float %}
    {% set TIME = params.TIME|default(300)|int %}
    M140 S{TEMP}
    M190 S{TEMP}
    M117 Heat soaking bed
    G4 P{TIME * 1000}
    M117 Heat soak complete

[gcode_macro PID_HOTEND]
description: Convenience macro for hotend PID tune
# Usage: PID_HOTEND TEMP=220
gcode:
    {% set TEMP = params.TEMP|default(220)|float %}
    PID_CALIBRATE HEATER=extruder TARGET={TEMP}

[gcode_macro PID_BED]
description: Convenience macro for bed PID tune
# Usage: PID_BED TEMP=60
gcode:
    {% set TEMP = params.TEMP|default(60)|float %}
    PID_CALIBRATE HEATER=heater_bed TARGET={TEMP}

#####################################################################
# Basic Speed Test
#####################################################################

[gcode_macro TEST_SPEED_SAFE]
description: Conservative motion check without extreme tuning assumptions
gcode:
    HOME_IF_NEEDED
    G90
    G1 Z10 F1200
    G1 X10 Y10 F6000
    G1 X225 Y10 F12000
    G1 X225 Y225 F12000
    G1 X10 Y225 F12000
    G1 X10 Y10 F12000
    G1 X117.5 Y117.5 F12000

# NOTE:
# This is not a performance ceiling test. It is only a sanity check.
