#### Project Leonardo - crowsnest.conf
####
#### Purpose:
#### - Basic USB webcam config for Mainsail/Crowsnest.
#### - Start conservative: 640x480 @ 15fps.
#### - Once the camera is plugged in and stable, you can try 1280x720 @ 15fps.
####
#### Notes:
#### - The dated file crowsnest.conf.2026-05-23-1732 is just an older backup-style config.
#### - Keep only this live file as: ~/printer_data/config/crowsnest.conf
#### - If no webcam is plugged in yet, Crowsnest may fail or show no device. That is not a printer emergency.
####
#### Default Mainsail webcam paths:
#### Port 8080 = /webcam/?action=stream
#### Port 8080 = /webcam/?action=snapshot

[crowsnest]
log_level: verbose                      # Valid options: quiet / verbose / debug
rollover_on_start: false                # false = keep log history instead of clearing every restart
no_proxy: false                         # leave false for normal MainsailOS/Moonraker proxy behavior

[cam 1]
mode: ustreamer                         # reliable MJPG stream/snapshot backend
port: 8080                              # default Mainsail webcam port
device: /dev/video0                     # use /dev/v4l/by-id/... later if multiple cameras exist
resolution: 640x480                     # safe starter resolution
max_fps: 10                             # safe starter fps for Raspberry Pi / basic USB cams
custom_flags: --format=MJPEG

# Optional later upgrade after the webcam is confirmed stable:
# resolution: 1280x720
# max_fps: 15

# If multiple cameras or unstable device numbering happen later:
# 1. Run: ls -l /dev/v4l/by-id/
# 2. Replace device: /dev/video0
#    with the stable by-id path for the camera.
#
# Example:
# device: /dev/v4l/by-id/usb-Your_Camera_Name-video-index0
