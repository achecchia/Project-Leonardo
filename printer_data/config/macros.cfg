###############################################################################################################
#                                              Information:                                                   #
###############################################################################################################
# Project Leonardo - Ender 3 Klipper Macros
#
# Consolidated from:
# - current macros.cfg
# - ai_macros.cfg reference ideas
#
# Design choices:
# - NO adaptive mesh during print start
# - NO automatic bed mesh during print start
# - Print jobs attempt to load saved mesh profile "default" if it exists
# - Bed mesh creation is manual/monthly via CREATE_BED_MESH or G29
#
# ::INCLUDE THE FOLLOWING IN ORCA SLICER::
#
# Print Start:
# M117
# M190 S0
# M109 S0
# PRINT_START EXTRUDER_TEMP=[first_layer_temperature] BED_TEMP=[first_layer_bed_temperature]
#
# Print End:
# PRINT_END
###############################################################################################################

###############################################################################################################
#                                             Additional Features:                                            #
###############################################################################################################
# NOTE:
# [exclude_object] lives in printer.cfg.
# Do not also define it here, or Klipper may throw a duplicate section error.

[gcode_macro PRINT_START]
description: Reliable start: heat bed, preheat nozzle, home, load saved mesh if present, heat nozzle, prime
gcode:
  {% set BED = params.BED_TEMP|default(params.BED|default(60))|float %}
  {% set EXTRUDER = params.EXTRUDER_TEMP|default(params.EXTRUDER|default(200))|float %}
  {% set LOAD_MESH = params.LOAD_MESH|default(1)|int %}
  {% set REQUIRE_MESH = params.REQUIRE_MESH|default(0)|int %}

  G90                                  ; Absolute positioning
  M140 S{BED}                          ; Start bed heating
  M104 S150                            ; Warm nozzle to reduce ooze while staying safer for homing
  M190 S{BED}                          ; Wait for bed temp
  G28                                  ; Home all axes

  {% if LOAD_MESH == 1 %}
    {% if printer.bed_mesh.profiles.default is defined %}
      BED_MESH_PROFILE LOAD=default
      {action_respond_info("PRINT_START: Loaded saved bed mesh profile 'default'")}
    {% elif REQUIRE_MESH == 1 %}
      {action_raise_error("PRINT_START: No saved bed mesh profile named 'default'. Run CREATE_BED_MESH first.")}
    {% else %}
      {action_respond_info("PRINT_START: No saved bed mesh profile named 'default'. Continuing without mesh.")}
    {% endif %}
  {% else %}
    {action_respond_info("PRINT_START: Mesh loading skipped by LOAD_MESH=0")}
  {% endif %}

  M109 S{EXTRUDER}                     ; Wait for final nozzle temp
  PRIME_LINE                           ; Simple purge line
  G0 Z5 F3000                          ; Move up


[gcode_macro PRINT_END]
description: End print: retract safely, move away, park, shut down heaters/fan, disable XY/E motors
gcode:
  SAVE_GCODE_STATE NAME=PRINT_END_STATE
  M400                                 ; Finish queued moves
  G92 E0                               ; Reset extruder position
  M83                                  ; Relative extrusion
  G1 E-3 F1800                         ; Small direct-drive friendly retract
  G92 E0                               ; Reset extruder again after retract
  _MOVE_AWAY                           ; Move away from the print
  PARK_CENTER_REAR                     ; Park center rear
  M106 S0                              ; Part cooling fan off
  TURN_OFF_HEATERS                     ; Hotend and bed off
  M84 X Y E                            ; Disable X/Y/E, keep Z enabled
  M117 Print complete
  RESTORE_GCODE_STATE NAME=PRINT_END_STATE


[gcode_macro CREATE_BED_MESH]
description: Manual bed mesh routine with save/cancel popup. Usage: CREATE_BED_MESH TEMP=60 SOAK=300
gcode:
  {% set BED = params.BED_TEMP|default(params.TEMP|default(60))|float %}
  {% set SOAK = params.SOAK|default(300)|int %}

  M117 Heating bed for mesh
  M140 S{BED}
  M190 S{BED}

  {% if SOAK > 0 %}
    M117 Heat soaking before mesh
    {action_respond_info("CREATE_BED_MESH: Heat soaking bed at %.1fC for %d seconds" % (BED, SOAK))}
    G4 P{SOAK * 1000}
  {% endif %}

  M117 Homing for mesh
  G28

  M117 Calibrating bed mesh
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE

  M117 Mesh complete - choose save or cancel
  RESPOND TYPE=command MSG="action:prompt_begin Bed Mesh Complete"
  RESPOND TYPE=command MSG="action:prompt_text New bed mesh is complete. Save it as the default mesh and restart Klipper?"
  RESPOND TYPE=command MSG="action:prompt_button_group_start"
  RESPOND TYPE=command MSG="action:prompt_button Save Mesh|_MESH_SAVE_AND_RESTART|primary"
  RESPOND TYPE=command MSG="action:prompt_button Cancel|_MESH_CANCEL_SAVE|secondary"
  RESPOND TYPE=command MSG="action:prompt_button_group_end"
  RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro _MESH_SAVE_AND_RESTART]
description: Save current mesh profile as default, then SAVE_CONFIG
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"
  M117 Saving mesh
  BED_MESH_PROFILE SAVE=default
  SAVE_CONFIG


[gcode_macro _MESH_CANCEL_SAVE]
description: Cancel saving current mesh and reload previous default mesh if available
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"
  M117 Mesh save canceled
  BED_MESH_CLEAR
  {% if printer.bed_mesh.profiles.default is defined %}
    BED_MESH_PROFILE LOAD=default
    {action_respond_info("CREATE_BED_MESH: Save canceled. Previous default mesh reloaded.")}
  {% else %}
    {action_respond_info("CREATE_BED_MESH: Save canceled. No previous default mesh found. Mesh cleared.")}
  {% endif %}

[gcode_macro G29]
description: Marlin-style bed mesh compatibility command. Calibrates current mesh but does not auto-save config.
gcode:
  G28
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE
  BED_MESH_PROFILE SAVE=default
  {action_respond_info("G29: Mesh calibrated and profile 'default' saved for this session. Run SAVE_CONFIG to persist it.")}

###############################################################################################################
#                                              References:                                                    #
###############################################################################################################

[gcode_macro M0]
description: Pause alias
gcode:
  PAUSE


[gcode_macro M600]
description: Basic filament change using PAUSE behavior
gcode:
  PAUSE


[gcode_macro M190]
description: Wait for bed temperature with optional status hooks
rename_existing: M190.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}
  M190.1 {rawparams}
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro M109]
description: Wait for hotend temperature with optional status hooks
rename_existing: M109.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}
  M109.1 {rawparams}
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro _WAIT]
description: Wait helper. TIME is in seconds.
gcode:
  {% set TIME = params.TIME|default(0)|int %}
  G4 P{TIME * 1000}


[gcode_macro _CQGL]
description: Quad gantry level helper. Not used on Ender 3 unless quad_gantry_level exists.
gcode:
  {% if printer.configfile.settings.quad_gantry_level is defined %}
    {% if printer.quad_gantry_level.applied == False %}
      {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
      {% endif %}
      {% if printer["gcode_macro status_leveling"] != null %}
        status_leveling
      {% endif %}
      QUAD_GANTRY_LEVEL
      G28 Z
    {% endif %}
  {% else %}
    {action_respond_info("quad_gantry_level is not configured on this printer")}
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}

###############################################################################################################
#                                          Basic Utility Macros:                                              #
###############################################################################################################

[gcode_macro HOME_IF_NEEDED]
description: Home all axes only if printer is not already homed
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% else %}
    {action_respond_info("Printer already homed")}
  {% endif %}


[gcode_macro PARK_CENTER]
description: Park toolhead near bed center for inspection or maintenance
gcode:
  SAVE_GCODE_STATE NAME=PARK_CENTER_STATE
  HOME_IF_NEEDED
  G90
  G1 Z20 F1200
  G1 X117.5 Y117.5 F6000
  RESTORE_GCODE_STATE NAME=PARK_CENTER_STATE


[gcode_macro HEAT_SOAK_BED]
description: Heat bed and wait. Usage: HEAT_SOAK_BED TEMP=60 TIME=300
gcode:
  {% set TEMP = params.TEMP|default(60)|float %}
  {% set TIME = params.TIME|default(300)|int %}
  M140 S{TEMP}
  M190 S{TEMP}
  M117 Heat soaking bed
  {action_respond_info("HEAT_SOAK_BED: Heat soaking bed at %.1fC for %d seconds" % (TEMP, TIME))}
  G4 P{TIME * 1000}
  M117 Heat soak complete
  {action_respond_info("HEAT_SOAK_BED: Heat soak complete")}


[gcode_macro PID_HOTEND]
description: Convenience macro for hotend PID tune. Usage: PID_HOTEND TEMP=220
gcode:
  {% set TEMP = params.TEMP|default(220)|float %}
  {action_respond_info("PID_HOTEND: Starting hotend PID tune at %.1fC" % TEMP)}
  PID_CALIBRATE HEATER=extruder TARGET={TEMP}


[gcode_macro PID_BED]
description: Convenience macro for bed PID tune. Usage: PID_BED TEMP=60
gcode:
  {% set TEMP = params.TEMP|default(60)|float %}
  {action_respond_info("PID_BED: Starting bed PID tune at %.1fC" % TEMP)}
  PID_CALIBRATE HEATER=heater_bed TARGET={TEMP}


[gcode_macro TEST_SPEED_SAFE]
description: Conservative motion sanity check. Homes if needed, then runs a simple XY movement box.
gcode:
  HOME_IF_NEEDED
  G90
  G1 Z10 F1200
  G1 X10 Y10 F6000
  G1 X225 Y10 F12000
  G1 X225 Y225 F12000
  G1 X10 Y225 F12000
  G1 X10 Y10 F12000
  G1 X117.5 Y117.5 F12000
  {action_respond_info("TEST_SPEED_SAFE complete")}

[gcode_macro PRIME_LINE]
description: Simple front-left purge line
gcode:
  SAVE_GCODE_STATE NAME=PRIME_LINE_STATE
  G90
  M83
  G92 E0
  G1 Z5.0 F3000
  G1 X5 Y20 F5000
  G1 Z0.30 F1200
  G1 X5 Y200 E12 F1200
  G1 X5.4 Y200 F5000
  G1 X5.4 Y20 E12 F1200
  G92 E0
  G1 Z2.0 F3000
  RESTORE_GCODE_STATE NAME=PRIME_LINE_STATE

###############################################################################################################
#                                              Movement Helpers:                                              #
###############################################################################################################

[gcode_macro _MOVE_AWAY]
description: Small move away from the finished print
gcode:
  {% set th = printer.toolhead %}
  {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
  {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
  {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}

  G90
  G0 X{x_safe} Y{y_safe} Z{z_safe} F12000


[gcode_macro PARK_CENTER_REAR]
description: Park toolhead centered at rear
gcode:
  {% if printer["gcode_macro status_busy"] != null %}
    status_busy
  {% endif %}

  {% set th = printer.toolhead %}
  G90
  G0 X{th.axis_maximum.x // 2} Y{th.axis_maximum.y - 2} F3600

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro PARK_FRONT]
description: Park toolhead near the front for maintenance
gcode:
  SAVE_GCODE_STATE NAME=PARK_FRONT_STATE
  HOME_IF_NEEDED
  G90
  G1 Z20 F1200
  G1 X117.5 Y20 F6000
  RESTORE_GCODE_STATE NAME=PARK_FRONT_STATE


[gcode_macro PARK_REAR]
description: Park toolhead near the rear
gcode:
  SAVE_GCODE_STATE NAME=PARK_REAR_STATE
  HOME_IF_NEEDED
  G90
  G1 Z20 F1200
  G1 X117.5 Y220 F6000
  RESTORE_GCODE_STATE NAME=PARK_REAR_STATE

###############################################################################################################
#                                                  Testing:                                                   #
###############################################################################################################

[gcode_macro TEST_PROBE]
description: Home and run BLTouch probe accuracy test
gcode:
  G28
  PROBE_ACCURACY SAMPLES=10


[gcode_macro TEST_SPEED]
description: Test max speed and acceleration. Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10
gcode:
  {% set speed = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
  {% set iterations = params.ITERATIONS|default(5)|int %}
  {% set accel = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
  {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
  {% set bound = params.BOUND|default(20)|int %}
  {% set smallpatternsize = params.SMALLPATTERNSIZE|default(20)|int %}

  {% set x_min = printer.toolhead.axis_minimum.x + bound %}
  {% set x_max = printer.toolhead.axis_maximum.x - bound %}
  {% set y_min = printer.toolhead.axis_minimum.y + bound %}
  {% set y_max = printer.toolhead.axis_maximum.y - bound %}

  {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float) / 2 %}
  {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float) / 2 %}
  {% set x_center_min = x_center - (smallpatternsize / 2) %}
  {% set x_center_max = x_center + (smallpatternsize / 2) %}
  {% set y_center_min = y_center - (smallpatternsize / 2) %}
  {% set y_center_max = y_center + (smallpatternsize / 2) %}

  SAVE_GCODE_STATE NAME=TEST_SPEED

  {action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel))}

  M400
  G28

  {% if printer.configfile.settings.quad_gantry_level is defined %}
    {% if printer.quad_gantry_level.applied == False %}
      QUAD_GANTRY_LEVEL
      G28 Z
    {% endif %}
  {% endif %}

  G90
  G1 X{printer.toolhead.axis_maximum.x - 50} Y{printer.toolhead.axis_maximum.y - 50} F{30 * 60}
  M400
  G28 X Y
  G0 X{printer.toolhead.axis_maximum.x - 1} Y{printer.toolhead.axis_maximum.y - 1} F{30 * 60}
  G4 P1000
  GET_POSITION

  G0 X{x_min} Y{y_min} Z{bound + 10} F{speed * 60}

  {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
  {% else %}
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel}
  {% endif %}

  {% for i in range(iterations) %}
    G0 X{x_min} Y{y_min} F{speed * 60}
    G0 X{x_max} Y{y_max} F{speed * 60}
    G0 X{x_min} Y{y_min} F{speed * 60}
    G0 X{x_max} Y{y_min} F{speed * 60}
    G0 X{x_min} Y{y_max} F{speed * 60}
    G0 X{x_max} Y{y_min} F{speed * 60}
    G0 X{x_min} Y{y_min} F{speed * 60}
    G0 X{x_min} Y{y_max} F{speed * 60}
    G0 X{x_max} Y{y_max} F{speed * 60}
    G0 X{x_max} Y{y_min} F{speed * 60}

    G0 X{x_center_min} Y{y_center_min} F{speed * 60}
    G0 X{x_center_max} Y{y_center_max} F{speed * 60}
    G0 X{x_center_min} Y{y_center_min} F{speed * 60}
    G0 X{x_center_max} Y{y_center_min} F{speed * 60}
    G0 X{x_center_min} Y{y_center_max} F{speed * 60}
    G0 X{x_center_max} Y{y_center_min} F{speed * 60}
    G0 X{x_center_min} Y{y_center_min} F{speed * 60}
    G0 X{x_center_min} Y{y_center_max} F{speed * 60}
    G0 X{x_center_max} Y{y_center_max} F{speed * 60}
    G0 X{x_center_max} Y{y_center_min} F{speed * 60}
  {% endfor %}

  {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}
  {% else %}
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel}
  {% endif %}

  M400
  G28
  G90
  G0 X{printer.toolhead.axis_maximum.x - 1} Y{printer.toolhead.axis_maximum.y - 1} F{30 * 60}
  G4 P1000
  GET_POSITION

  RESTORE_GCODE_STATE NAME=TEST_SPEED
